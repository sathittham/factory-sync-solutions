<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactorySync Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  </head>
  <body>
    <script>
      // Handoff from the official site (cross-subdomain): seed language, theme,
      // and cookie consent from query params, then strip them from the URL.
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          var allow = {
            lang: { key: 'fss-locale', valid: ['th', 'en'] },
            theme: { key: 'fss-theme', valid: ['light', 'dark', 'system'] },
            consent: { key: 'fss-cookie-consent', valid: ['all', 'partial', 'essential'] },
            analytics: { key: 'fss-analytics-consent', valid: ['true', 'false'] },
            marketing: { key: 'fss-marketing-consent', valid: ['true', 'false'] }
          };
          var changed = false;
          Object.keys(allow).forEach(function (param) {
            var v = p.get(param);
            if (v !== null && allow[param].valid.indexOf(v) !== -1) {
              localStorage.setItem(allow[param].key, v);
            }
            if (v !== null) { p.delete(param); changed = true; }
          });
          if (changed) {
            var qs = p.toString();
            history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
          }
        } catch (e) {}
      })();
      // Prevent theme flash — apply saved theme before first paint
      (function(){var t=localStorage.getItem('fss-theme')||'system';var d=t==='system'?window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light':t;document.documentElement.classList.add(d)})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
