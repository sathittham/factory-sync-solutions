name: Test

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]
  workflow_call:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      official: ${{ steps.filter.outputs.official }}
      gateway: ${{ steps.filter.outputs.gateway }}
      cms: ${{ steps.filter.outputs.cms }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            api:
              - 'apps/backend/**'
            web:
              - 'apps/web-app/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            official:
              - 'apps/web-official/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.github/workflows/test.yml'
            gateway:
              - 'infra/cloudflare/workers/api-gateway/**'
              - '.github/workflows/test.yml'
            cms:
              - 'apps/web-cms/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/test.yml'

  backend:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: apps/backend/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download dependencies
        run: go mod download

      - name: Generate Swagger docs
        run: API_DOCS_API_VERSION=v1 ../../scripts/generate-api-docs.sh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: go build ./...

  frontend:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check, test, and build (web-app)
        run: pnpm turbo run type-check test build --filter=@repo/web-app

  official:
    name: Official Site Tests
    needs: changes
    if: needs.changes.outputs.official == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # web-official has no type-check script; `astro build` is the compile-time
      # check. Runs without secrets — PUBLIC_* vars fall back at build time.
      - name: Lint, test, and build (web-official)
        run: pnpm turbo run lint test build --filter=@repo/web-official

  api-gateway:
    name: API Gateway Tests
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm --filter @repo/api-gateway test

  cms:
    name: CMS Tests
    needs: changes
    if: needs.changes.outputs.cms == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @repo/web-cms type-check

      - name: Test
        run: pnpm --filter @repo/web-cms test
