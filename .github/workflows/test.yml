name: Test

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]
  workflow_call:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/fs-backend/**'
            web:
              - 'apps/fs-app-web/**'
            gateway:
              - 'infra/cloudflare/workers/api-gateway/**'
              - '.github/workflows/test.yml'

  backend:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/fs-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: apps/fs-backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download dependencies
        run: go mod download

      - name: Generate Swagger docs
        run: API_DOCS_API_VERSION=v1 ../../scripts/generate-api-docs.sh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: go build ./...

  frontend:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/fs-app-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/fs-app-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build

  api-gateway:
    name: API Gateway Tests
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/cloudflare/workers/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test
        run: npm test
