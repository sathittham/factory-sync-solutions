name: Deploy Production

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-*"

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy-backend:
    name: Deploy Backend to Production
    needs: test
    runs-on: ubuntu-latest
    environment: production
    env:
      GCP_PROJECT_ID: factory-health-check
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=asia-southeast1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-api:${{ github.sha }}
          docker build -t $IMAGE apps/fs-backend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy factory-sync-solutions-api \
            --image=asia-southeast1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-api:${{ github.sha }} \
            --region=asia-southeast1 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production,RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},CF_TURNSTILE_SECRET=${{ secrets.CF_TURNSTILE_SECRET }},SLACK_WEBHOOK_REGISTRATION=${{ secrets.SLACK_WEBHOOK_REGISTRATION }},SLACK_WEBHOOK_QUIZ_RESULT=${{ secrets.SLACK_WEBHOOK_QUIZ_RESULT }},ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}"

  deploy-frontend:
    name: Deploy Frontend to Production
    needs: test
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: apps/fs-app-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/fs-app-web/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npx vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_CF_TURNSTILE_SITE_KEY: ${{ vars.VITE_CF_TURNSTILE_SITE_KEY }}
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/fs-app-web/dist --project-name=factory-sync-solutions --branch=main
