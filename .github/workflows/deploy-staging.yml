name: Deploy Staging

on:
  push:
    tags:
      - "v*-staging"
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Force-deploy backend API (use to bootstrap a new service)"
        type: boolean
        default: true
      deploy_web:
        description: "Force-deploy app web"
        type: boolean
        default: false
      deploy_official:
        description: "Force-deploy official site"
        type: boolean
        default: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.detect.outputs.api }}
      web: ${{ steps.detect.outputs.web }}
      official: ${{ steps.detect.outputs.official }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect changed apps since previous staging tag
        id: detect
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — honoring force-deploy inputs."
            { echo "api=${{ inputs.deploy_api }}";
              echo "web=${{ inputs.deploy_web }}";
              echo "official=${{ inputs.deploy_official }}"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CURRENT="${GITHUB_REF_NAME}"
          PREV=$(git tag -l 'v*-staging' --sort=-creatordate | grep -vx "$CURRENT" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous staging tag — deploying all apps."
            { echo "api=true"; echo "web=true"; echo "official=true"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Diffing $PREV..$CURRENT"
          CHANGED=$(git diff --name-only "$PREV" "$CURRENT")
          echo "Changed files:"; echo "$CHANGED"
          api=false; web=false; official=false
          if echo "$CHANGED" | grep -q '^apps/fs-backend/';      then api=true;      fi
          if echo "$CHANGED" | grep -q '^apps/fs-app-web/';      then web=true;      fi
          if echo "$CHANGED" | grep -q '^apps/fs-official-web/'; then official=true; fi
          echo "Deploy → api=$api web=$web official=$official"
          { echo "api=$api"; echo "web=$web"; echo "official=$official"; } >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend to Staging
    needs: [test, changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker asia-southeast3-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=asia-southeast3-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-api-staging:${{ github.sha }}
          docker build -t $IMAGE apps/fs-backend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy factory-sync-solutions-api-staging \
            --image=asia-southeast3-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-api-staging:${{ github.sha }} \
            --region=asia-southeast3 \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=deployer@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="^@^ENVIRONMENT=staging@RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}@CF_TURNSTILE_SECRET=${{ secrets.CF_TURNSTILE_SECRET }}@SLACK_WEBHOOK_REGISTRATION=${{ secrets.SLACK_WEBHOOK_REGISTRATION }}@SLACK_WEBHOOK_QUIZ_RESULT=${{ secrets.SLACK_WEBHOOK_QUIZ_RESULT }}@ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}"

  deploy-frontend:
    name: Deploy Frontend to Staging
    needs: [test, changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/fs-app-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/fs-app-web/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npx vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_CF_TURNSTILE_SITE_KEY: ${{ vars.VITE_CF_TURNSTILE_SITE_KEY }}
          # Analytics intentionally disabled on staging — keeps test traffic out
          # of production GTM/GA. Production injects these in deploy-production.yml.

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/fs-app-web/dist --project-name=factory-sync-solutions-staging --branch=staging

  deploy-official:
    name: Deploy Official Site to Staging
    needs: [test, changes]
    if: needs.changes.outputs.official == 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/fs-official-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/fs-official-web/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build:staging
        env:
          PUBLIC_APP_URL: https://staging.factorysyncsolutions.com
          PUBLIC_APP_VERSION: ${{ github.ref_name }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/fs-official-web/dist --project-name=factory-sync-solutions-official-staging --branch=staging

  notify:
    name: Notify Slack
    needs: [test, changes, deploy-backend, deploy-frontend, deploy-official]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send deploy summary to Slack
        env:
          SLACK_WEBHOOK_DEPLOY: ${{ secrets.SLACK_WEBHOOK_DEPLOY }}
          ENVIRONMENT: staging
          TEST_RESULT: ${{ needs.test.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          OFFICIAL_RESULT: ${{ needs.deploy-official.result }}
          TAG: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK_DEPLOY" ]; then
            echo "SLACK_WEBHOOK_DEPLOY not set — skipping Slack notification."
            exit 0
          fi

          status_label() {
            case "$1" in
              success)    echo "✅ deployed" ;;
              failure)    echo "❌ failed" ;;
              cancelled)  echo "🚫 cancelled" ;;
              skipped|"") echo "⏭️ no changes" ;;
              *)          echo "❔ $1" ;;
            esac
          }

          # Overall outcome: failure if any required job failed or was cancelled.
          OVERALL="success"
          for r in "$TEST_RESULT" "$CHANGES_RESULT" "$BACKEND_RESULT" "$FRONTEND_RESULT" "$OFFICIAL_RESULT"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then OVERALL="failure"; fi
          done

          if [ "$OVERALL" = "success" ]; then
            HEADER="✅ Staging deploy succeeded — ${TAG}"
          else
            HEADER="❌ Staging deploy failed — ${TAG}"
          fi

          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          SHORT_SHA="${SHA:0:7}"

          PAYLOAD=$(jq -n \
            --arg header "$HEADER" \
            --arg env "$ENVIRONMENT" \
            --arg tag "$TAG" \
            --arg sha "$SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg test "$(status_label "$TEST_RESULT")" \
            --arg backend "$(status_label "$BACKEND_RESULT")" \
            --arg frontend "$(status_label "$FRONTEND_RESULT")" \
            --arg official "$(status_label "$OFFICIAL_RESULT")" \
            --arg run_url "$RUN_URL" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: $header, emoji: true } },
                { type: "section", fields: [
                  { type: "mrkdwn", text: "*Environment:*\n\($env)" },
                  { type: "mrkdwn", text: "*Tag:*\n\($tag)" },
                  { type: "mrkdwn", text: "*Commit:*\n`\($sha)`" },
                  { type: "mrkdwn", text: "*Triggered by:*\n\($actor)" }
                ]},
                { type: "section", fields: [
                  { type: "mrkdwn", text: "*Tests:*\n\($test)" },
                  { type: "mrkdwn", text: "*Backend:*\n\($backend)" },
                  { type: "mrkdwn", text: "*App Web:*\n\($frontend)" },
                  { type: "mrkdwn", text: "*Official Web:*\n\($official)" }
                ]},
                { type: "actions", elements: [
                  { type: "button", text: { type: "plain_text", text: "View workflow run", emoji: true }, url: $run_url }
                ]}
              ]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_DEPLOY"
