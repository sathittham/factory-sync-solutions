name: Deploy Staging

on:
  push:
    tags:
      - "v*-staging"
      - "v*-staging-*"
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Force-deploy backend API (use to bootstrap a new service)"
        type: boolean
        default: true
      deploy_gateway:
        description: "Force-deploy Cloudflare API gateway"
        type: boolean
        default: true
      deploy_web:
        description: "Force-deploy app web"
        type: boolean
        default: true
      deploy_official:
        description: "Force-deploy official site"
        type: boolean
        default: true
      deploy_consumer:
        description: "Force-deploy domain event consumer"
        type: boolean
        default: true
      deploy_backoffice:
        description: "Force-deploy backoffice web"
        type: boolean
        default: true
      deploy_cms:
        description: "Force-deploy CMS worker"
        type: boolean
        default: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.detect.outputs.api }}
      gateway: ${{ steps.detect.outputs.gateway }}
      web: ${{ steps.detect.outputs.web }}
      official: ${{ steps.detect.outputs.official }}
      backoffice: ${{ steps.detect.outputs.backoffice }}
      consumer: ${{ steps.detect.outputs.consumer }}
      cms: ${{ steps.detect.outputs.cms }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect changed apps since previous staging tag
        id: detect
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — honoring force-deploy inputs."
            { echo "api=${{ inputs.deploy_api }}";
              echo "gateway=${{ inputs.deploy_gateway }}";
              echo "web=${{ inputs.deploy_web }}";
              echo "official=${{ inputs.deploy_official }}";
              echo "consumer=${{ inputs.deploy_consumer }}";
              echo "backoffice=${{ inputs.deploy_backoffice }}";
              echo "cms=${{ inputs.deploy_cms }}"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CURRENT="${GITHUB_REF_NAME}"
          PREV=$(git tag -l 'v*-staging' 'v*-staging-*' --sort=-creatordate | grep -vx "$CURRENT" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous staging tag — deploying all apps."
            { echo "api=true"; echo "gateway=true"; echo "web=true"; echo "official=true"; echo "consumer=true"; echo "backoffice=true"; echo "cms=true"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Diffing $PREV..$CURRENT"
          CHANGED=$(git diff --name-only "$PREV" "$CURRENT")
          echo "Changed files:"; echo "$CHANGED"
          api=false; gateway=false; web=false; official=false; backoffice=false; cms=false
          if echo "$CHANGED" | grep -qE '^apps/backend/|^\.github/workflows/deploy-staging\.yml'; then api=true; consumer=true; fi
          if echo "$CHANGED" | grep -qE '^infra/cloudflare/workers/api-gateway/|^\.github/workflows/deploy-staging\.yml'; then gateway=true; fi
          if echo "$CHANGED" | grep -qE '^apps/web-app/|^packages/shared/|^pnpm-lock\.yaml|^\.github/workflows/deploy-staging\.yml';     then web=true;        fi
          if echo "$CHANGED" | grep -qE '^apps/web-official/|^packages/shared/|^pnpm-lock\.yaml|^\.github/workflows/deploy-staging\.yml'; then official=true; fi
          if echo "$CHANGED" | grep -qE '^apps/web-backoffice/|^packages/shared/|^pnpm-lock\.yaml|^\.github/workflows/deploy-staging\.yml'; then backoffice=true; fi
          if echo "$CHANGED" | grep -qE '^apps/web-cms/|^pnpm-lock\.yaml|^\.github/workflows/deploy-staging\.yml'; then cms=true; fi
          echo "Deploy → api=$api gateway=$gateway web=$web official=$official consumer=$consumer backoffice=$backoffice cms=$cms"
          { echo "api=$api"; echo "gateway=$gateway"; echo "web=$web"; echo "official=$official"; echo "consumer=$consumer"; echo "backoffice=$backoffice"; echo "cms=$cms"; } >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend to Staging
    needs: [test, changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: apps/backend/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Generate Swagger docs
        run: API_DOCS_API_VERSION=v1 ./scripts/generate-api-docs.sh

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker asia-southeast3-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=asia-southeast3-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-api-staging:${{ github.sha }}
          docker build -t $IMAGE apps/backend
          docker push $IMAGE

      - name: Publish Swagger docs to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_DOCS_ENVIRONMENT: staging
          API_DOCS_API_VERSION: v1
          API_DOCS_R2_BUCKET: apidoc-factorysyncsolutions-com-staging
          API_DOCS_R2_PREFIX: ${{ vars.API_DOCS_R2_PREFIX || 'openapi' }}
        run: ./scripts/publish-api-docs-r2.sh

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy factory-sync-solutions-api-staging \
            --image=asia-southeast3-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-api-staging:${{ github.sha }} \
            --region=asia-southeast3 \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=deployer@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="^@^ENVIRONMENT=staging@GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}@DOMAIN_EVENT_MODE=pubsub@DOMAIN_EVENT_PUBSUB_TOPIC=${{ vars.DOMAIN_EVENT_PUBSUB_TOPIC || 'factory-sync-domain-events' }}@APP_URL=https://app-staging.factorysyncsolutions.com@RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}@CF_TURNSTILE_SECRET=${{ secrets.CF_TURNSTILE_SECRET }}@SLACK_WEBHOOK_REGISTRATION=${{ secrets.SLACK_WEBHOOK_REGISTRATION }}@SLACK_WEBHOOK_QUIZ_RESULT=${{ secrets.SLACK_WEBHOOK_QUIZ_RESULT }}@ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }},https://app-staging.factorysyncsolutions.com,https://backoffice-staging.factorysyncsolutions.com,https://staging.factorysyncsolutions.com@R2_ACCOUNT_ID=${{ vars.R2_ACCOUNT_ID }}@R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}@R2_ACCESS_KEY_SECRET=${{ secrets.R2_ACCESS_KEY_SECRET }}@R2_PUBLIC_BUCKET=uploads-factorysyncsolutions-com-staging@R2_PUBLIC_BASE_URL=https://cdn-staging.factorysyncsolutions.com@API_DOCS_SOURCE=r2@API_DOCS_R2_ACCOUNT_ID=${{ secrets.API_DOCS_R2_ACCOUNT_ID }}@API_DOCS_R2_ACCESS_KEY_ID=${{ secrets.API_DOCS_R2_ACCESS_KEY_ID }}@API_DOCS_R2_ACCESS_KEY_SECRET=${{ secrets.API_DOCS_R2_ACCESS_KEY_SECRET }}@API_DOCS_R2_BUCKET=apidoc-factorysyncsolutions-com-staging@API_DOCS_R2_PREFIX=openapi@API_DOCS_SUPPORTED_VERSIONS=v1@API_DOCS_DEFAULT_VERSION=v1@API_DOCS_LOCAL_DIR=docs@GA4_PROPERTY_ID=${{ vars.GA4_PROPERTY_ID }}" \
            --set-secrets="GA4_SA_CREDENTIALS_JSON=ga4-sa-credentials:latest"

  deploy-domain-event-consumer:
    name: Deploy Domain Event Consumer to Staging
    needs: [test, changes]
    if: needs.changes.outputs.consumer == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker asia-southeast3-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=asia-southeast3-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-domain-event-consumer-staging:${{ github.sha }}
          docker build -t $IMAGE apps/backend
          docker push $IMAGE

      - name: Deploy consumer to Cloud Run
        run: |
          gcloud run deploy factory-sync-solutions-domain-event-consumer-staging \
            --image=asia-southeast3-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-domain-event-consumer-staging:${{ github.sha }} \
            --region=asia-southeast3 \
            --platform=managed \
            --command="./domain-event-consumer" \
            --no-allow-unauthenticated \
            --service-account=deployer@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --min-instances=1 \
            --max-instances=2 \
            --concurrency=1 \
            --cpu=1 \
            --memory=512Mi \
            --set-env-vars="^@^ENVIRONMENT=staging@GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}@RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}@SLACK_WEBHOOK_REGISTRATION=${{ secrets.SLACK_WEBHOOK_REGISTRATION }}@SLACK_WEBHOOK_QUIZ_RESULT=${{ secrets.SLACK_WEBHOOK_QUIZ_RESULT }}@DOMAIN_EVENT_SUBSCRIPTION=${{ vars.DOMAIN_EVENT_SUBSCRIPTION || 'factory-sync-domain-events-result-consumer' }}@DOMAIN_EVENT_INBOX_COLLECTION=${{ vars.DOMAIN_EVENT_INBOX_COLLECTION || 'domain_event_inbox' }}@DOMAIN_EVENT_INBOX_LEASE=${{ vars.DOMAIN_EVENT_INBOX_LEASE || '5m' }}@DOMAIN_EVENT_MAX_ATTEMPTS=${{ vars.DOMAIN_EVENT_MAX_ATTEMPTS || '5' }}@DOMAIN_EVENT_DLQ_PROJECT_ID=${{ vars.DOMAIN_EVENT_DLQ_PROJECT_ID }}@DOMAIN_EVENT_PUBSUB_DLQ_TOPIC=${{ vars.DOMAIN_EVENT_PUBSUB_DLQ_TOPIC || 'factory-sync-domain-events-dlq' }}@DOMAIN_EVENT_SUBSCRIPTION_GOROUTINES=${{ vars.DOMAIN_EVENT_SUBSCRIPTION_GOROUTINES || '2' }}@DOMAIN_EVENT_SUBSCRIPTION_MAX_OUTSTANDING_MESSAGES=${{ vars.DOMAIN_EVENT_SUBSCRIPTION_MAX_OUTSTANDING_MESSAGES || '200' }}@DOMAIN_EVENT_SUBSCRIPTION_MAX_OUTSTANDING_BYTES=${{ vars.DOMAIN_EVENT_SUBSCRIPTION_MAX_OUTSTANDING_BYTES || '0' }}"

  deploy-api-gateway:
    name: Deploy API Gateway to Staging
    needs: [test, changes]
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: deploy --config infra/cloudflare/workers/api-gateway/wrangler.toml --env staging

  deploy-frontend:
    name: Deploy Frontend to Staging
    needs: [test, changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/web-app
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm exec vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: https://api-staging.factorysyncsolutions.com/v1
          VITE_CF_TURNSTILE_SITE_KEY: ${{ vars.VITE_CF_TURNSTILE_SITE_KEY }}
          VITE_OFFICIAL_WEB_URL: https://staging.factorysyncsolutions.com
          # Analytics intentionally disabled on staging — keeps test traffic out
          # of production GTM/GA. Production injects these in deploy-production.yml.

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy apps/web-app/dist --project-name=factory-sync-solutions-staging --branch=staging

  deploy-official:
    name: Deploy Official Site to Staging
    needs: [test, changes]
    if: needs.changes.outputs.official == 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/web-official
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Compute version
        id: version
        run: |
          BASE=$(echo "$GITHUB_REF_NAME" | sed 's/-staging.*$//')
          echo "version=${BASE}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:staging
        env:
          PUBLIC_APP_URL: https://app-staging.factorysyncsolutions.com
          PUBLIC_APP_VERSION: ${{ steps.version.outputs.version }}
          PUBLIC_API_BASE_URL: https://api-staging.factorysyncsolutions.com/v1
          PUBLIC_CMS_URL: https://cms-staging.factorysyncsolutions.com
          PUBLIC_CF_TURNSTILE_SITE_KEY: ${{ vars.VITE_CF_TURNSTILE_SITE_KEY }}
          PUBLIC_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy apps/web-official/dist --project-name=factory-sync-solutions-official-staging --branch=staging

  e2e-official:
    name: E2E Official Site (Staging)
    needs: [changes, deploy-official]
    if: needs.changes.outputs.official == 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/web-official
    env:
      STAGING_URL: https://staging.factorysyncsolutions.com
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Wait for staging deployment to be live
        run: |
          echo "Polling $STAGING_URL for a 200…"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/" || echo "000")
            if [ "$code" = "200" ]; then echo "Live after ${i} attempt(s)."; exit 0; fi
            echo "  attempt $i → HTTP $code; retrying in 5s"
            sleep 5
          done
          echo "::error::Staging site did not return 200 within timeout"; exit 1

      - name: Run Playwright e2e against staging
        run: pnpm exec playwright test --project=chromium --project=mobile-chrome
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.STAGING_URL }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-official
          path: apps/web-official/playwright-report/
          retention-days: 14

  deploy-backoffice:
    name: Deploy Backoffice to Staging
    needs: [test, changes]
    if: needs.changes.outputs.backoffice == 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/web-backoffice
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:staging
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: https://api-staging.factorysyncsolutions.com/v1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
          command: pages deploy apps/web-backoffice/dist --project-name=factory-sync-backoffice-staging --branch=staging

  deploy-cms:
    name: Deploy CMS to Staging
    needs: [test, changes]
    if: needs.changes.outputs.cms == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @repo/web-cms db:migrate:staging

      - name: Deploy CMS worker (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @repo/web-cms deploy:staging

  notify:
    name: Notify Slack
    needs: [test, changes, deploy-backend, deploy-api-gateway, deploy-frontend, deploy-official, e2e-official, deploy-backoffice, deploy-cms]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send deploy summary to Slack
        env:
          SLACK_WEBHOOK_DEPLOY: ${{ secrets.SLACK_WEBHOOK_DEPLOY }}
          ENVIRONMENT: staging
          TEST_RESULT: ${{ needs.test.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          GATEWAY_RESULT: ${{ needs.deploy-api-gateway.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
          OFFICIAL_RESULT: ${{ needs.deploy-official.result }}
          OFFICIAL_E2E_RESULT: ${{ needs.e2e-official.result }}
          BACKOFFICE_RESULT: ${{ needs.deploy-backoffice.result }}
          CMS_RESULT: ${{ needs.deploy-cms.result }}
          TAG: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK_DEPLOY" ]; then
            echo "SLACK_WEBHOOK_DEPLOY not set — skipping Slack notification."
            exit 0
          fi

          status_label() {
            case "$1" in
              success)    echo "✅ deployed" ;;
              failure)    echo "❌ failed" ;;
              cancelled)  echo "🚫 cancelled" ;;
              skipped|"") echo "⏭️ no changes" ;;
              *)          echo "❔ $1" ;;
            esac
          }

          # Overall outcome: failure if any required job failed or was cancelled.
          OVERALL="success"
          for r in "$TEST_RESULT" "$CHANGES_RESULT" "$BACKEND_RESULT" "$GATEWAY_RESULT" "$FRONTEND_RESULT" "$OFFICIAL_RESULT" "$OFFICIAL_E2E_RESULT" "$BACKOFFICE_RESULT" "$CMS_RESULT"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then OVERALL="failure"; fi
          done

          if [ "$OVERALL" = "success" ]; then
            HEADER="✅ Staging deploy succeeded — ${TAG}"
          else
            HEADER="❌ Staging deploy failed — ${TAG}"
          fi

          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          SHORT_SHA="${SHA:0:7}"

          PAYLOAD=$(jq -n \
            --arg header "$HEADER" \
            --arg env "$ENVIRONMENT" \
            --arg tag "$TAG" \
            --arg sha "$SHORT_SHA" \
            --arg actor "$ACTOR" \
            --arg test "$(status_label "$TEST_RESULT")" \
            --arg backend "$(status_label "$BACKEND_RESULT")" \
            --arg gateway "$(status_label "$GATEWAY_RESULT")" \
            --arg frontend "$(status_label "$FRONTEND_RESULT")" \
            --arg official "$(status_label "$OFFICIAL_RESULT")" \
            --arg official_e2e "$(status_label "$OFFICIAL_E2E_RESULT")" \
            --arg backoffice "$(status_label "$BACKOFFICE_RESULT")" \
            --arg cms "$(status_label "$CMS_RESULT")" \
            --arg run_url "$RUN_URL" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: $header, emoji: true } },
                { type: "section", fields: [
                  { type: "mrkdwn", text: "*Environment:*\n\($env)" },
                  { type: "mrkdwn", text: "*Tag:*\n\($tag)" },
                  { type: "mrkdwn", text: "*Commit:*\n`\($sha)`" },
                  { type: "mrkdwn", text: "*Triggered by:*\n\($actor)" }
                ]},
                { type: "section", fields: [
                  { type: "mrkdwn", text: "*Tests:*\n\($test)" },
                  { type: "mrkdwn", text: "*Backend:*\n\($backend)" },
                  { type: "mrkdwn", text: "*API Gateway:*\n\($gateway)" },
                  { type: "mrkdwn", text: "*App Web:*\n\($frontend)" },
                  { type: "mrkdwn", text: "*Official Web:*\n\($official)" },
                  { type: "mrkdwn", text: "*Official E2E:*\n\($official_e2e)" },
                  { type: "mrkdwn", text: "*Backoffice:*\n\($backoffice)" },
                  { type: "mrkdwn", text: "*CMS:*\n\($cms)" }
                ]},
                { type: "actions", elements: [
                  { type: "button", text: { type: "plain_text", text: "View workflow run", emoji: true }, url: $run_url }
                ]}
              ]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_DEPLOY"
