name: Deploy Staging

on:
  push:
    tags:
      - "v*-staging"

jobs:
  test:
    uses: ./.github/workflows/test.yml

  changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.detect.outputs.api }}
      web: ${{ steps.detect.outputs.web }}
      official: ${{ steps.detect.outputs.official }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect changed apps since previous staging tag
        id: detect
        run: |
          CURRENT="${GITHUB_REF_NAME}"
          PREV=$(git tag -l 'v*-staging' --sort=-creatordate | grep -vx "$CURRENT" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous staging tag — deploying all apps."
            { echo "api=true"; echo "web=true"; echo "official=true"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Diffing $PREV..$CURRENT"
          CHANGED=$(git diff --name-only "$PREV" "$CURRENT")
          echo "Changed files:"; echo "$CHANGED"
          api=false; web=false; official=false
          if echo "$CHANGED" | grep -q '^apps/fs-backend/';      then api=true;      fi
          if echo "$CHANGED" | grep -q '^apps/fs-app-web/';      then web=true;      fi
          if echo "$CHANGED" | grep -q '^apps/fs-official-web/'; then official=true; fi
          echo "Deploy → api=$api web=$web official=$official"
          { echo "api=$api"; echo "web=$web"; echo "official=$official"; } >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend to Staging
    needs: [test, changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker asia-southeast3-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=asia-southeast3-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-api-staging:${{ github.sha }}
          docker build -t $IMAGE apps/fs-backend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy factory-sync-solutions-api-staging \
            --image=asia-southeast3-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run/factory-sync-solutions-api-staging:${{ github.sha }} \
            --region=asia-southeast3 \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=deployer@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="^@^ENVIRONMENT=staging@RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}@CF_TURNSTILE_SECRET=${{ secrets.CF_TURNSTILE_SECRET }}@SLACK_WEBHOOK_REGISTRATION=${{ secrets.SLACK_WEBHOOK_REGISTRATION }}@SLACK_WEBHOOK_QUIZ_RESULT=${{ secrets.SLACK_WEBHOOK_QUIZ_RESULT }}@ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}"

  deploy-frontend:
    name: Deploy Frontend to Staging
    needs: [test, changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/fs-app-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/fs-app-web/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npx vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_CF_TURNSTILE_SITE_KEY: ${{ vars.VITE_CF_TURNSTILE_SITE_KEY }}
          VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/fs-app-web/dist --project-name=factory-sync-solutions-staging --branch=staging

  deploy-official:
    name: Deploy Official Site to Staging
    needs: [test, changes]
    if: needs.changes.outputs.official == 'true'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/fs-official-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/fs-official-web/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build:staging
        env:
          PUBLIC_APP_URL: https://staging.factorysyncsolutions.com
          PUBLIC_APP_VERSION: ${{ github.ref_name }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/fs-official-web/dist --project-name=factory-sync-solutions-official-staging --branch=staging
